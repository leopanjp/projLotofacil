services:
  db:
    image: postgres:16-alpine
    container_name: lotofacil-db
    environment:
      POSTGRES_DB: LOTERIA
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d LOTERIA"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lotofacil-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/LOTERIA
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      CAIXA_LOTOFACIL_BASE_URL: https://servicebus2.caixa.gov.br/portaldeloterias/api/lotofacil
    volumes:
      - ./saida:/app/saida

volumes:
  postgres_data:
